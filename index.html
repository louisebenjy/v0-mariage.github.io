<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Louise & Benjy RSVP</title>
    <!-- Load Kaboom.js directly from the web -->
    <script src="https://unpkg.com/kaboom@3000.0.1/dist/kaboom.js"></script>
    <style>
        /* This removes margins and makes the game fill the screen */
        body { margin: 0; overflow: hidden; background-color: #87CEEB; }
    </style>
</head>
<body>
<script>
    // Initialize the game engine and set the sky color
    kaboom({ background: [135, 206, 235] });

    // Define the main game scene
    scene("game", () => {
        // 1. ADD THE GROUND
        add([
            rect(width(), 50),
            pos(0, height() - 50),
            area(), // Gives it a physical hitbox
            body({ isStatic: true }), // Gravity won't pull it down, and things can stand on it
            color(34, 139, 34) // Grass green
        ]);

        // 2. ADD INSTRUCTIONS
        add([
            text("Use Left/Right to move. UP to jump!\nSmash your answer from below.", { size: 24, align: "center" }),
            pos(width() / 2, 50),
            anchor("center"),
            color(0, 0, 0)
        ]);

        
        // 3. ADD THE PLAYER (Now a guaranteed visible red square!)
    const player = add([
        rect(40, 40),         // A 40x40 pixel square
        pos(80, 40),          // Starting X and Y position
        color(255, 50, 50),   // Bright red color so it stands out
        area(),               // Gives the character a hitbox for collisions
        body(),               // Adds gravity and physics
    ]);
        // 4. ADD THE RSVP BLOCKS
        // 'Yes' Block
        const yesBlock = add([
            rect(120, 80),
            pos(width() / 2 - 200, height() - 250),
            area(),
            body({ isStatic: true }),
            color(50, 205, 50), // Green
            "rsvp_block", // A custom tag we will use for collision detection
            { choice: "YES, I will be there!" } // Custom data attached to this block
        ]);
        add([text("YES", { size: 32 }), pos(width() / 2 - 165, height() - 225), color(255,255,255)]);

        // 'No' Block
        const noBlock = add([
            rect(120, 80),
            pos(width() / 2 + 80, height() - 250),
            area(),
            body({ isStatic: true }),
            color(220, 20, 60), // Red
            "rsvp_block",
            { choice: "NO, sadly I cannot." }
        ]);
        add([text("NO", { size: 32 }), pos(width() / 2 + 125, height() - 225), color(255,255,255)]);

        // 5. ADD MOVEMENT & PHYSICS
        const SPEED = 320;
        const JUMP_FORCE = 800;
        setGravity(1600);

        onKeyDown("left", () => { player.move(-SPEED, 0); });
        onKeyDown("right", () => { player.move(SPEED, 0); });
        
        onKeyPress("up", () => { 
            if (player.isGrounded()) { player.jump(JUMP_FORCE); } 
        });

        // 6. COLLISION DETECTION (The "Mario" smash)
        // When the player collides with anything tagged "rsvp_block"...
        player.onCollide("rsvp_block", (block, collision) => {
            // ...check if the collision happened on the BOTTOM of the block
            if (collision.isBottom()) {
                // Flash the block briefly
                block.color = rgb(255, 255, 255);
                // Wait 0.1 seconds, then go to the end screen
                wait(0.1, () => {
                    go("success", block.choice);
                });
            }
        });
    });

    // Define the success scene (what happens after hitting a block)
    scene("success", (choice) => {
        add([
            text(`RSVP RECORDED:\n\n${choice}\n\n(Later, this will send an email/DB update!)`, { 
                size: 32, 
                align: "center",
                width: width() - 100 
            }),
            pos(width() / 2, height() / 2),
            anchor("center"),
            color(0, 0, 0)
        ]);
    });

    // Start the game!
    go("game");
</script>
</body>
</html>
